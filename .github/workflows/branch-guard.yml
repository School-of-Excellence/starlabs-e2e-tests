name: branch-guard (reusable)

# CI/CD plan enforcement: GitHub Free + private repos can't *require* branch protection, so this guard
# DETECTS stray direct pushes to protected branches (development / production) and alerts (optionally reverts).
# A push is considered legitimate when EITHER the pusher is allowlisted (e.g. an emergency hotfix) OR the
# head commit is associated with a merged PR. Anything else opens a `branch-guard` issue tagging the pusher.
on:
  workflow_call:
    inputs:
      allowlist:
        description: 'Space-separated GitHub usernames allowed to push protected branches directly'
        type: string
        default: 'vignesh-027'
      auto_revert:
        description: 'If true, automatically revert the stray commit (needs contents:write + unprotected push)'
        type: boolean
        default: false

permissions:
  contents: write       # for optional auto-revert
  issues: write         # to open the alert issue
  pull-requests: read   # to check whether the commit came via a PR

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history, for optional revert)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect stray direct push
        env:
          GH_TOKEN: ${{ github.token }}
          ALLOWLIST: ${{ inputs.allowlist }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          AUTO_REVERT: ${{ inputs.auto_revert }}
        run: |
          # 1) Allowlisted pusher → allowed (emergency path).
          case " $ALLOWLIST " in
            *" $ACTOR "*) echo "✓ pusher $ACTOR is allowlisted — allowed."; exit 0 ;;
          esac

          # 2) Did this commit arrive via a (merged) PR? If yes, it's a normal merge — allowed.
          PRS="$(gh api "repos/$REPO/commits/$SHA/pulls" --jq 'length' 2>/dev/null || echo 0)"
          if [ "${PRS:-0}" -gt 0 ]; then
            echo "✓ commit $SHA is associated with $PRS PR(s) — normal merge, allowed."; exit 0
          fi

          # 3) Otherwise: a stray direct push to a protected branch. Alert.
          echo "::warning::Stray direct push to '$BRANCH' by '$ACTOR' (commit $SHA, no associated PR)."
          gh issue create --repo "$REPO" \
            --title "⚠️ Stray direct push to '$BRANCH' by @$ACTOR" \
            --body "Commit \`$SHA\` was pushed directly to protected branch \`$BRANCH\` by @$ACTOR with **no associated pull request**.

          Per the CI/CD policy, protected branches change only via reviewed PRs, and **production** only via allowlisted manual dispatch. Please open a PR for this change (or it may be reverted).

          — branch-guard" \
            --label "branch-guard" 2>/dev/null \
            || echo "::warning::could not open issue (check Actions token permissions: issues:write)."

          # 4) Optional auto-revert.
          if [ "$AUTO_REVERT" = "true" ]; then
            echo "auto_revert=true → reverting $SHA on $BRANCH"
            git config user.name  "branch-guard[bot]"
            git config user.email "branch-guard@users.noreply.github.com"
            if git revert --no-edit "$SHA"; then
              git push origin "HEAD:$BRANCH" || echo "::error::auto-revert push rejected (branch protection or token perms)."
            else
              echo "::warning::revert produced conflicts — manual intervention needed."
            fi
          fi

# flutter-e2e — REUSABLE gate for breakthroughs-flutter (Stage-2, Case 4).
#
# Honest split (per the CI/CD plan): Playwright covers WEB only; native UI is covered by `integration_test`.
# This gate runs the RELIABLE core on every PR — analyze (advisory) + `flutter test` (widget/unit) + `flutter
# build web` (both hard gates) — and, OPT-IN (run_integration: true), boots the Firebase emulator + seed from
# the e2e hub and runs the integration_test smoke on web against it. Integration is opt-in because it depends on
# the seed fix tracked in SETUP.md §6.2 (participant profile needs a role_ref) — keep it advisory until green.
#
# Native delivery (APK→App Distribution, IPA→TestFlight/Codemagic) + the prod deploy-gate are a SEPARATE step,
# deferred until the Apple/Codemagic/Google-Play credentials exist (master plan §10.3). slackAPK.yml is the
# Android-build starting point to extend.
name: flutter-e2e (reusable gate)

on:
  workflow_call:
    inputs:
      flutter_version:
        type: string
        default: '3.29.3'      # matches the proven slackAPK.yml
      run_integration:
        description: 'Also boot emulator+seed and run the integration_test smoke on web (opt-in; advisory)'
        type: boolean
        default: false
      e2e_ref:
        type: string
        default: main
      firebase_project:
        type: string
        default: demo-slabs-queue
      timeout_minutes:
        type: number
        default: 40
    secrets:
      POSTHOG_APIKEY:
        required: false
      CICD_PAT:
        description: 'Needed only when run_integration=true (to clone the e2e engine for emulator+seed)'
        required: false
      STARLABS_CICD_SA:
        required: false

jobs:
  flutter-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout_minutes }}
    env:
      CI: 'true'
    steps:
      - name: Checkout flutter app (caller)
        uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}

      - name: Inject secrets (PostHog)
        run: |
          mkdir -p android
          cat > android/local.properties << EOF
          posthog.api.key=${{ secrets.POSTHOG_APIKEY }}
          EOF
          cat > Secrets.xcconfig << EOF
          POSTHOG_API_KEY = ${{ secrets.POSTHOG_APIKEY }}
          EOF

      - name: flutter pub get
        run: flutter pub get

      - name: Analyze (advisory)
        continue-on-error: true
        run: flutter analyze || echo "analyze findings (advisory)"

      - name: Unit / widget tests (hard gate)
        run: flutter test

      - name: Build web (hard gate)
        run: flutter build web --release

      # ── OPT-IN: emulator-backed integration_test smoke on web ──────────────────────────────────────────
      - name: Set up Java (emulator JRE)
        if: ${{ inputs.run_integration }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Clone the E2E engine (for emulator + seed) → ./e2e
        if: ${{ inputs.run_integration }}
        uses: actions/checkout@v4
        with:
          repository: School-of-Excellence/starlabs-e2e-tests
          ref: ${{ inputs.e2e_ref }}
          path: e2e
          token: ${{ secrets.CICD_PAT }}

      - name: Boot emulator + CF and seed (project starlabs-cicd)
        if: ${{ inputs.run_integration }}
        env:
          FIREBASE_PROJECT: ${{ inputs.firebase_project }}
        run: |
          npm i -g firebase-tools@latest
          cd e2e && npm ci
          nohup bash scripts/deploy-cf-emulator.sh > /tmp/emu.log 2>&1 &
          for i in $(seq 1 90); do grep -q "All emulators ready" /tmp/emu.log && break; sleep 2; done
          grep -q "All emulators ready" /tmp/emu.log || { echo "::error::emulator failed to boot"; cat /tmp/emu.log; exit 1; }

      - name: Integration_test smoke on web (advisory — see SETUP §6.2)
        if: ${{ inputs.run_integration }}
        continue-on-error: true
        run: |
          # Chrome + chromedriver drive the web build of the integration smoke against the emulator.
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/smoke_test.dart \
            -d web-server --release || echo "integration smoke advisory result recorded"

      - name: Upload web build + any integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: build/web
          retention-days: 7

      - name: Record run in append-only history
        if: always()
        env:
          STARLABS_CICD_SA_JSON: ${{ secrets.STARLABS_CICD_SA }}
        run: |
          if [ -z "$STARLABS_CICD_SA_JSON" ] || [ ! -d e2e ]; then
            echo "history skipped (no SA or no e2e engine checked out)."; exit 0
          fi
          echo "$STARLABS_CICD_SA_JSON" > "$RUNNER_TEMP/cicd-sa.json"
          cd e2e
          STARLABS_CICD_SA="$RUNNER_TEMP/cicd-sa.json" \
          REPO="${{ github.repository }}" \
          BRANCH="${{ github.head_ref || github.ref_name }}" \
          SHA="${{ github.event.pull_request.head.sha || github.sha }}" \
          ACTOR="${{ github.actor }}" \
          SOURCE=ci SUITE=flutter STAGE=gate \
          RESULT="${{ job.status == 'success' && 'pass' || 'fail' }}" \
          REPORT_DIR=../build/web \
          node scripts/history/record-run.cjs

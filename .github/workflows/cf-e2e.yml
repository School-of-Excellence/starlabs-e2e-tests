# cf-e2e — REUSABLE hermetic gate for a CLOUD-FUNCTION change (Stage-2 gate for starlabs-cloud-function).
#
# Same engine as web-e2e.yml, but the repo UNDER TEST is the Cloud-Functions repo (the caller). The Angular
# app is cloned at a fixed branch (it is the harness here), and the CALLER checkout (the CF PR head) provides
# the REAL modified triggers. "Preview = the emulator gate": reviewers read this gate's report (a backend
# change has no preview URL). Cross-repo: when CF lands on development, the Angular gate re-runs too.
#
# Final layout (matches what the e2e scripts expect):
#   ./                          → starlabs-angular  (cloned @ app_branch)   — app under :4200
#   ./e2e                       → starlabs-e2e-tests (cloned @ e2e_ref)     — the engine + ci/overlay
#   ./starlabs-cloud-function   → THIS PR's CF head  (caller checkout)      — the real triggers
name: cf-e2e (reusable emulator gate)

on:
  workflow_call:
    inputs:
      app_branch:
        description: 'starlabs-angular branch to use as the app harness'
        type: string
        default: development
      e2e_ref:
        description: 'Ref of the e2e engine repo (hub) to clone'
        type: string
        default: main
      firebase_project:
        description: 'Emulator project id — MUST match the app overlay projectId (starlabs-cicd) or auth/reads silently break (SETUP §3)'
        type: string
        default: starlabs-cicd
    secrets:
      # One GitHub PAT with read access to starlabs-e2e-tests AND starlabs-angular (the CF gate clones both).
      REPO_PAT:
        description: 'GitHub PAT with read access to the private starlabs-e2e-tests + starlabs-angular repos'
        required: true
      STARLABS_CICD_SA:
        description: 'starlabs-cicd service-account JSON — enables append-only history writes (optional)'
        required: false

jobs:
  cf-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      FIREBASE_PROJECT: ${{ inputs.firebase_project }}
      CI: 'true'
    steps:
      - name: Clone the app harness (starlabs-angular) → repo root
        uses: actions/checkout@v4
        with:
          repository: School-of-Excellence/starlabs-angular
          ref: ${{ inputs.app_branch }}
          token: ${{ secrets.REPO_PAT }}

      - name: Checkout the Cloud Functions PR head (caller) → ./starlabs-cloud-function
        uses: actions/checkout@v4
        with:
          path: starlabs-cloud-function

      - name: Clone the E2E engine repo (starlabs-e2e-tests) → ./e2e
        uses: actions/checkout@v4
        with:
          repository: School-of-Excellence/starlabs-e2e-tests
          ref: ${{ inputs.e2e_ref }}
          path: e2e
          token: ${{ secrets.REPO_PAT }}

      # Hub-style symlinks so the e2e scripts resolve the app + cloud-function (mirror local ./setup.sh).
      - name: Wire hub-style symlinks (app + cloud-function) for the e2e scripts
        run: |
          ln -sfn "$GITHUB_WORKSPACE" e2e/app
          ln -sfn "$GITHUB_WORKSPACE/starlabs-cloud-function" e2e/starlabs-cloud-function
          ls -l e2e/app e2e/starlabs-cloud-function

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Overlay emulator config from the e2e repo onto the app
        run: bash e2e/ci/setup-emulator-config.sh

      - name: Install firebase-tools
        run: npm i -g firebase-tools@latest

      - name: Install app deps
        run: npm ci --legacy-peer-deps

      - name: Install Cloud Functions deps
        run: cd starlabs-cloud-function/functions && npm ci

      - name: Install e2e deps
        run: cd e2e && npm ci

      - name: Install Playwright chromium
        run: cd e2e && npx playwright install --with-deps chromium

      - name: Boot Firebase emulator + Cloud Functions (the PR's triggers)
        run: |
          cd e2e && nohup bash scripts/deploy-cf-emulator.sh > /tmp/emu.log 2>&1 &
          for i in $(seq 1 90); do grep -q "All emulators ready" /tmp/emu.log && break; sleep 2; done
          if ! grep -q "All emulators ready" /tmp/emu.log; then echo "::error::emulator failed to boot"; cat /tmp/emu.log; exit 1; fi
          grep -E "functions: Loaded|All emulators ready" /tmp/emu.log

      - name: Boot emulator-wired Angular app
        run: |
          nohup npm run start:emulator > /tmp/app.log 2>&1 &
          for i in $(seq 1 120); do curl -sf http://localhost:4200 >/dev/null 2>&1 && break; sleep 3; done
          if ! curl -sf http://localhost:4200 >/dev/null 2>&1; then echo "::error::app failed to serve on :4200"; tail -60 /tmp/app.log; exit 1; fi

      - name: Run isolated queue e2e suite (the gate, against the PR's triggers)
        id: gate
        run: cd e2e && EMU_REUSE=1 EMU_REUSE_APP=1 TESTRUNID=run1 bash scripts/run-isolated.sh

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 14

      - name: Record run in append-only history
        if: always()
        env:
          STARLABS_CICD_SA_JSON: ${{ secrets.STARLABS_CICD_SA }}
        run: |
          if [ -z "$STARLABS_CICD_SA_JSON" ]; then
            echo "STARLABS_CICD_SA not set — skipping history write (non-fatal)."; exit 0
          fi
          echo "$STARLABS_CICD_SA_JSON" > "$RUNNER_TEMP/cicd-sa.json"
          cd e2e
          STARLABS_CICD_SA="$RUNNER_TEMP/cicd-sa.json" \
          REPO="${{ github.repository }}" \
          BRANCH="${{ github.head_ref || github.ref_name }}" \
          SHA="${{ github.event.pull_request.head.sha || github.sha }}" \
          ACTOR="${{ github.actor }}" \
          SOURCE=ci SUITE=queue STAGE=cf-gate \
          RESULT="${{ steps.gate.outcome == 'success' && 'pass' || 'fail' }}" \
          REPORT_DIR=playwright-report \
          ATTACH="fixtures/sample-queue-config.json,fixtures/firestore-seed.json" \
          node scripts/history/record-run.cjs
